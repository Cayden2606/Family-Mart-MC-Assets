<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grad IMG Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .search-box {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            backdrop-filter: blur(10px);
        }
        input[type="text"]:focus {
            outline: 2px solid #e94560;
            background: rgba(255,255,255,0.15);
        }
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .student-card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .student-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-5px);
            border-color: #e94560;
        }
        .student-card.selected {
            border-color: #e94560;
            background: rgba(233,69,96,0.2);
        }
        .student-card.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }
        .student-index {
            color: #e94560;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .student-name {
            margin-top: 10px;
            font-size: 1rem;
            line-height: 1.4;
        }
        .student-admin {
            margin-top: 5px;
            color: #888;
            font-family: monospace;
        }
        .detail-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            display: none;
        }
        .detail-panel.show {
            display: block;
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .detail-name {
            font-size: 1.8rem;
            color: #e94560;
        }
        .close-btn {
            background: #e94560;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        .close-btn:hover {
            transform: rotate(90deg);
        }
        .detail-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .info-label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        .photo-card.error img {
            display: none;
        }
        .photo-card.error::before {
            content: 'Photo not found';
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: #666;
        }
        .photo-label {
            padding: 10px;
            text-align: center;
            color: #888;
            font-family: monospace;
        }
        .scan-btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .scan-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        .scan-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .photo-loading {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #e94560;
            transition: width 0.3s;
        }
        .terminal {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            background: #1e1e2e;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .terminal-header {
            background: #2d2d3d;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .terminal-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f57; }
        .dot.yellow { background: #febc2e; }
        .dot.green { background: #28c840; }
        .terminal-title {
            color: #888;
            font-size: 0.75rem;
            font-family: monospace;
        }
        .terminal-body {
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            color: #cdd6f4;
        }
        .terminal-body .line-fail {
            color: #f38ba8;
        }
        .terminal-body .line-pass {
            color: #a6e3a1;
        }
        .terminal-body .line-info {
            color: #89b4fa;
        }
        .terminal-body .line-count {
            color: #9399b2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Grad IMG Lookup</h1>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search student name..." oninput="filterStudents()">
            <label style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;cursor:pointer;font-size:0.9rem;color:#888;">
                <input type="checkbox" id="sortChecked" onchange="filterStudents()"> Show photos first
            </label>
        </div>

        <div class="student-grid" id="studentGrid"></div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-name" id="detailName"></div>
                <button class="close-btn" onclick="closePanel()">&times;</button>
            </div>

            <div class="detail-info">
                <div class="info-box">
                    <div class="info-label">Index</div>
                    <div class="info-value" id="detailIndex"></div>
                </div>
                <div class="info-box">
                    <div class="info-label">Admin Number</div>
                    <div class="info-value" id="detailAdmin"></div>
                </div>
                <div class="info-box">
                    <div class="info-label">C15 Position</div>
                    <div class="info-value" id="detailPosition"></div>
                </div>
                <div class="info-box">
                    <div class="info-label">Timestamp</div>
                    <div class="info-value" id="detailTimestamp"></div>
                </div>
                <div class="info-box">
                    <div class="info-label">YouTube</div>
                    <div class="info-value" id="detailYoutube"></div>
                </div>
            </div>

            <button class="scan-btn" id="scanBtn" onclick="scanPhotos()">Scan for Photos</button>
            <div class="progress-bar" id="progressBar" style="display:none;margin-top:15px;">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>

            <div class="terminal" id="terminal" style="display:none;">
                <div class="terminal-header">
                    <div class="terminal-dots">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                    <div class="terminal-title">scan — bash</div>
                </div>
                <div class="terminal-body" id="terminalBody"></div>
            </div>

            <div class="photo-grid" id="photoGrid" style="margin-top:20px;"></div>
        </div>
    </div>

        let selectedStudent = null;

        function getPosition(student) {
            return student.position || (student.index + 88);
        }

        function isDisabled(s) {
            return !s.admin || !s.timestamp || s.timestamp === 'NOT FOUND';
        }

        function renderStudents(filter = '') {
            const grid = document.getElementById('studentGrid');
            const filtered = students.filter(s =>
                s.name.toLowerCase().includes(filter.toLowerCase())
            );
            const active = filtered.filter(s => !isDisabled(s));
            const greyed = filtered.filter(s => isDisabled(s));

            const sortByChecked = document.getElementById('sortChecked').checked;
            let sorted;
            if (sortByChecked) {
                const withPhoto = active.filter(s => s.hasPhoto);
                const withoutPhoto = active.filter(s => !s.hasPhoto);
                sorted = [...withPhoto, ...withoutPhoto, ...greyed];
            } else {
                sorted = [...active, ...greyed];
            }

            grid.innerHTML = sorted.map(s => {
                const disabled = isDisabled(s);
                return `
                <div class="student-card ${disabled ? 'disabled' : ''} ${selectedStudent?.index === s.index ? 'selected' : ''}"
                     ${disabled ? '' : `onclick="selectStudent(${s.index})"`}>
                    <div class="student-index">#${s.index} ${s.position ? '(Pos ' + s.position + ')' : ''} ${s.hasPhoto ? '<span style="color:#28c840;">&#10003;</span>' : ''}</div>
                    <div class="student-name">${s.name}</div>
                    <div class="student-admin">${s.admin}${s.timestamp && s.timestamp !== 'NOT FOUND' ? ' | ' + s.timestamp : ''}</div>
                </div>
            `}).join('');
        }

        function selectStudent(index) {
            selectedStudent = students.find(s => s.index === index);
            document.getElementById('studentGrid').style.display = 'none';
            document.getElementById('search').parentElement.style.display = 'none';

            document.getElementById('detailName').textContent = selectedStudent.name;
            document.getElementById('detailIndex').textContent = selectedStudent.index;
            document.getElementById('detailAdmin').textContent = selectedStudent.admin;
            document.getElementById('detailPosition').textContent = getPosition(selectedStudent);
            document.getElementById('detailTimestamp').textContent = selectedStudent.timestamp || '—';
            const ytEl = document.getElementById('detailYoutube');
            if (selectedStudent.link) {
                ytEl.innerHTML = `<a href="${selectedStudent.link}" target="_blank" style="color:#e94560;text-decoration:none;">Watch</a>`;
            } else {
                ytEl.textContent = '—';
            }

            document.getElementById('photoGrid').innerHTML = '';
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('progressBar').style.display = 'none';

            document.getElementById('detailPanel').classList.add('show');
        }

        function closePanel() {
            document.getElementById('detailPanel').classList.remove('show');
            document.getElementById('studentGrid').style.display = '';
            document.getElementById('search').parentElement.style.display = '';
            selectedStudent = null;
            renderStudents(document.getElementById('search').value);
        }

        function filterStudents() {
            renderStudents(document.getElementById('search').value);
        }

        function checkImage(url) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        function termLog(msg, type = 'info') {
            const body = document.getElementById('terminalBody');
            const line = document.createElement('div');
            line.className = `line-${type}`;
            line.textContent = msg;
            body.appendChild(line);
            body.scrollTop = body.scrollHeight;
        }

        async function scanPrefix(admin, position, prefix, startRange, endRange) {
            const progressFill = document.getElementById('progressFill');
            const total = endRange - startRange + 1;
            const BATCH = 20;
            termLog(`$ scanning ${prefix} [${startRange}..${endRange}] (batch=${BATCH})`, 'info');

            for (let i = startRange; i <= endRange; i += BATCH) {
                const batchEnd = Math.min(i + BATCH - 1, endRange);
                const promises = [];
                for (let j = i; j <= batchEnd; j++) {
                    const num = j.toString().padStart(4, '0');
                    const url = `https://www.werkzgallery.com/nyp/ind_images/${admin}/C15_${position}-${prefix}_${num}.jpg`;
                    promises.push(checkImage(url).then(ok => ({ ok, url, number: j, num })));
                }

                const results = await Promise.all(promises);
                const hit = results.find(r => r.ok);
                const count = batchEnd - startRange + 1;

                if (hit) {
                    termLog(`[${count}/${total}] ${prefix}_${hit.num}.jpg ✓ FOUND`, 'pass');
                    return { found: true, url: hit.url, number: hit.number };
                }

                if (count % 100 < BATCH || count === BATCH) {
                    termLog(`[${count}/${total}] ${prefix}_${i.toString().padStart(4,'0')}-${batchEnd.toString().padStart(4,'0')} ✗`, 'fail');
                }

                const progress = (count / total) * 100;
                progressFill.style.width = `${progress}%`;
            }

            termLog(`$ ${prefix} — no match in range`, 'fail');
            return { found: false };
        }

        async function scanPhotos() {
            if (!selectedStudent) return;

            const btn = document.getElementById('scanBtn');
            btn.disabled = true;
            btn.textContent = 'Scanning...';

            const terminal = document.getElementById('terminal');
            const terminalBody = document.getElementById('terminalBody');
            terminal.style.display = 'block';
            terminalBody.innerHTML = '';

            const photoGrid = document.getElementById('photoGrid');
            const progressBar = document.getElementById('progressBar');
            progressBar.style.display = 'block';
            progressBar.style.marginTop = '15px';
            document.getElementById('progressFill').style.width = '0%';

            photoGrid.innerHTML = '';

            const admin = selectedStudent.admin;
            const position = getPosition(selectedStudent);
            termLog(`$ target: ${selectedStudent.name} | admin=${admin} | pos=${position}`, 'info');

            // Try both LUI and DSC
            const lui = await scanPrefix(admin, position, 'LUI', 1, 5000);
            const dsc = await scanPrefix(admin, position, 'DSC', 1, 5000);

            document.getElementById('progressFill').style.width = '100%';
            termLog(`$ scan complete`, 'info');

            photoGrid.innerHTML = `
                <div class="photo-card ${lui.found ? '' : 'error'}">
                    ${lui.found ? `<img src="${lui.url}" alt="LUI" onclick="openLightbox(this.src)" style="cursor:pointer;" onerror="this.parentElement.classList.add('error')">` : ''}
                    <div class="photo-label">LUI_${lui.found ? lui.number.toString().padStart(4, '0') : '####'}</div>
                </div>
                <div class="photo-card ${dsc.found ? '' : 'error'}">
                    ${dsc.found ? `<img src="${dsc.url}" alt="DSC" onclick="openLightbox(this.src)" style="cursor:pointer;" onerror="this.parentElement.classList.add('error')">` : ''}
                    <div class="photo-label">DSC_${dsc.found ? dsc.number.toString().padStart(4, '0') : '####'}</div>
                </div>
            `;

            btn.disabled = false;
            btn.textContent = 'Scan for Photos';
            progressBar.style.display = 'none';
        }

        function openLightbox(src) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer;';
            overlay.onclick = () => overlay.remove();
            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 0 40px rgba(0,0,0,0.5);';
            overlay.appendChild(img);
            document.body.appendChild(overlay);
        }

        // Initialize
        renderStudents();
